<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stag.io · cosmic registration</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link
      href="https://api.fontshare.com/v2/css?f[]=satoshi@900,700,500,400&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      :root {
        --bg-main: #f2f0f5;
        --bg-panel: #ffffffd9;
        --text-dark: #1f1b2c;
        --text-soft: #4a4359;
        --accent-1: #6c47ff;
        --accent-2: #ff4d9a;
        --accent-gradient: linear-gradient(145deg, #6c47ff, #ff4d9a);
        --student-gradient: linear-gradient(145deg, #2563eb, #4f46e5);
        --company-gradient: linear-gradient(145deg, #7c3aed, #9333ea);
        --card-shadow:
          0 30px 50px -25px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(0, 0, 0, 0.02);
        --border-light: 1px solid rgba(255, 255, 255, 0.5);
        --glow: 0 15px 30px -10px #6c47ff80;
      }
      body.dark {
        --bg-main: #12101c;
        --bg-panel: #1d1a2bd9;
        --text-dark: #f0eaff;
        --text-soft: #b8b0d0;
        --accent-1: #9f8cff;
        --accent-2: #ff9acb;
        --card-shadow: 0 30px 50px -25px #010014, 0 0 0 1px #ffffff0d;
        --border-light: 1px solid #ffffff12;
      }
      body {
        background: var(--bg-main);
        font-family: "Satoshi", sans-serif;
        min-height: 100vh;
        transition: background 0.3s;
        padding: 2rem 0;
        overflow-x: hidden;
      }
      .bg-blob {
        position: fixed;
        width: 600px;
        height: 600px;
        border-radius: 50%;
        background: var(--accent-gradient);
        opacity: 0.1;
        filter: blur(60px);
        z-index: 0;
      }
      .bg-blob-1 {
        top: -200px;
        left: -200px;
      }
      .bg-blob-2 {
        bottom: -200px;
        right: -200px;
        background: linear-gradient(145deg, #ff4d9a, #6c47ff);
      }
      .register-container {
        position: relative;
        z-index: 10;
        max-width: 900px;
        margin: 0 auto;
        padding: 0 2rem;
      }
      .theme-orb-small {
        position: absolute;
        top: 2rem;
        right: 2rem;
        width: 50px;
        height: 50px;
        border-radius: 50%;
        background: color-mix(in srgb, var(--accent-1) 15%, transparent);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.5rem;
        cursor: pointer;
        border: var(--border-light);
        backdrop-filter: blur(8px);
        z-index: 20;
        transition: 0.2s;
      }
      .theme-orb-small:hover {
        background: var(--accent-1);
        color: white;
      }
      .logo-cosmic {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 15px;
        margin-bottom: 2rem;
        text-decoration: none;
      }
      .logo-morph {
        width: 58px;
        height: 58px;
        background: var(--accent-gradient);
        border-radius: 35% 65% 70% 30% / 44% 30% 70% 56%;
        box-shadow: var(--glow);
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-weight: 900;
        font-size: 1.8rem;
      }
      .logo-cosmic span {
        font-weight: 900;
        font-size: 2.3rem;
        background: var(--accent-gradient);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        letter-spacing: -2px;
      }
      .register-card {
        background: var(--bg-panel);
        backdrop-filter: blur(18px);
        border-radius: 70px;
        padding: 2.5rem;
        box-shadow: var(--card-shadow);
        border: var(--border-light);
      }
      .register-header {
        text-align: center;
        margin-bottom: 2rem;
      }
      .register-header h3 {
        font-weight: 900;
        font-size: 2.2rem;
        letter-spacing: -1px;
        margin-bottom: 0.5rem;
        color: var(--text-dark);
      }
      .register-header p {
        color: var(--text-soft);
      }
      .user-type-pills {
        display: flex;
        gap: 1rem;
        margin-bottom: 2rem;
      }
      .type-pill {
        flex: 1;
        padding: 1.2rem;
        border: var(--border-light);
        background: color-mix(in srgb, var(--accent-1) 8%, transparent);
        border-radius: 60px;
        font-weight: 700;
        color: var(--text-soft);
        cursor: pointer;
        transition: 0.2s;
        font-size: 1.1rem;
      }
      .type-pill.active.student {
        background: var(--student-gradient);
        color: white;
        box-shadow: 0 15px 30px -10px #2563eb80;
      }
      .type-pill.active.company {
        background: var(--company-gradient);
        color: white;
        box-shadow: 0 15px 30px -10px #7c3aed80;
      }
      .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
      }
      .form-group {
        margin-bottom: 1.5rem;
      }
      .form-label {
        font-weight: 700;
        color: var(--text-dark);
        margin-bottom: 0.5rem;
        display: block;
      }
      .input-blob-group {
        display: flex;
        align-items: center;
        background: color-mix(in srgb, var(--accent-1) 5%, transparent);
        border-radius: 60px;
        border: var(--border-light);
        overflow: hidden;
        transition: 0.2s;
      }
      .input-blob {
        flex: 1;
        background: transparent;
        border: none;
        padding: 1rem 1rem 1rem 0;
        color: var(--text-dark);
        font-family: inherit;
        font-size: 1rem;
      }
      .input-blob:focus {
        outline: none;
      }
      .input-icon {
        padding: 0 1rem;
        color: var(--accent-1);
      }
      textarea.input-blob {
        padding: 1rem;
        min-height: 80px;
      }
      .toggle-password-blob {
        background: transparent;
        border: none;
        padding-right: 1.2rem;
        cursor: pointer;
        color: var(--text-soft);
      }
      .checkbox-blob {
        display: flex;
        align-items: center;
        gap: 0.8rem;
        cursor: pointer;
        margin: 1.5rem 0;
        color: var(--text-soft);
      }
      .check-custom {
        width: 22px;
        height: 22px;
        border-radius: 6px;
        border: var(--border-light);
        background: #eee;
        display: inline-block;
        position: relative;
      }
      .checkbox-blob input {
        display: none;
      }
      .checkbox-blob input:checked + .check-custom::after {
        content: "✓";
        position: absolute;
        left: 5px;
        top: -2px;
        color: var(--accent-2);
        font-weight: bold;
      }
      .btn-register {
        width: 100%;
        padding: 1.2rem;
        border: none;
        border-radius: 60px;
        color: white;
        font-weight: 700;
        font-size: 1.1rem;
        cursor: pointer;
        transition: 0.3s;
      }
      .btn-register:hover {
        transform: translateY(-2px);
        filter: brightness(1.1);
      }
      .hidden {
        display: none !important;
      }
      .register-footer {
        text-align: center;
        margin-top: 1.5rem;
        color: var(--text-soft);
      }
      .register-footer a {
        color: var(--accent-1);
        text-decoration: none;
        font-weight: bold;
      }
      @media (max-width: 768px) {
        .form-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="bg-blob bg-blob-1"></div>
    <div class="bg-blob bg-blob-2"></div>

    <div class="theme-orb-small" id="themeToggle">
      <i class="bi bi-sun-fill"></i>
    </div>

    <div class="register-container">
      <a href="{{ url_for('home') }}" class="logo-cosmic">
        <div class="logo-morph">S</div>
        <span>stag.io</span>
      </a>

      <div class="register-card">
        <div class="register-header">
          <h3>create account</h3>
          <p>join our platform and start your journey</p>
        </div>

        <div class="user-type-pills">
          <button
            id="studentBtn"
            type="button"
            class="type-pill student active"
          >
            <i class="bi bi-person"></i> I'm a Student
          </button>
          <button id="companyBtn" type="button" class="type-pill company">
            <i class="bi bi-building"></i> I'm a Company
          </button>
        </div>

        <form id="registerForm">
          <input
            type="hidden"
            id="userTypeInput"
            name="userType"
            value="student"
          />

          <div id="studentForm">
            <div class="form-grid">
              <div class="form-group">
                <label class="form-label">First Name</label>
                <div class="input-blob-group">
                  <span class="input-icon"><i class="bi bi-person"></i></span>
                  <input
                    type="text"
                    name="firstName"
                    class="input-blob"
                    placeholder="Ahmed"
                    required
                  />
                </div>
              </div>
              <div class="form-group">
                <label class="form-label">Last Name</label>
                <div class="input-blob-group">
                  <span class="input-icon"><i class="bi bi-person"></i></span>
                  <input
                    type="text"
                    name="lastName"
                    class="input-blob"
                    placeholder="Benali"
                    required
                  />
                </div>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">University Email</label>
              <div class="input-blob-group">
                <span class="input-icon"><i class="bi bi-envelope"></i></span>
                <input
                  type="email"
                  name="studentEmail"
                  class="input-blob"
                  placeholder="your.email@university.dz"
                  required
                />
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">Phone</label>
              <div class="input-blob-group">
                <span class="input-icon"><i class="bi bi-phone"></i></span>
                <input
                  type="tel"
                  name="studentPhone"
                  class="input-blob"
                  placeholder="0555 12 34 56"
                  required
                />
              </div>
            </div>
            <div class="form-grid">
              <div class="form-group">
                <label class="form-label">Password</label>
                <div class="input-blob-group">
                  <span class="input-icon"><i class="bi bi-lock"></i></span>
                  <input
                    type="password"
                    id="studentPassword"
                    name="password"
                    class="input-blob"
                    required
                  />
                  <button type="button" class="toggle-password-blob togglePass">
                    <i class="bi bi-eye"></i>
                  </button>
                </div>
              </div>
              <div class="form-group">
                <label class="form-label">Confirm Password</label>
                <div class="input-blob-group">
                  <span class="input-icon"><i class="bi bi-lock"></i></span>
                  <input
                    type="password"
                    id="studentConfirm"
                    class="input-blob"
                    required
                  />
                </div>
              </div>
            </div>
          </div>

          <div id="companyForm" class="hidden">
            <div class="form-group">
              <label class="form-label">Company Name</label>
              <div class="input-blob-group">
                <span class="input-icon"><i class="bi bi-building"></i></span>
                <input
                  type="text"
                  name="companyName"
                  class="input-blob"
                  placeholder="Your Company Name"
                />
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">Company Email</label>
              <div class="input-blob-group">
                <span class="input-icon"><i class="bi bi-envelope"></i></span>
                <input
                  type="email"
                  name="companyEmail"
                  class="input-blob"
                  placeholder="contact@company.com"
                />
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">Phone</label>
              <div class="input-blob-group">
                <span class="input-icon"><i class="bi bi-phone"></i></span>
                <input
                  type="tel"
                  name="companyPhone"
                  class="input-blob"
                  placeholder="021 12 34 56"
                />
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">Wilaya</label>
              <div class="input-blob-group">
                <span class="input-icon"><i class="bi bi-geo-alt"></i></span>
                <select name="wilaya" class="input-blob">
                  <option value="">Select Wilaya</option>
                  <option>Alger</option>
                  <option>Oran</option>
                  <option>Tipaza</option>
                </select>
              </div>
            </div>
            <div class="form-grid">
              <div class="form-group">
                <label class="form-label">Password</label>
                <div class="input-blob-group">
                  <span class="input-icon"><i class="bi bi-lock"></i></span>
                  <input
                    type="password"
                    id="companyPassword"
                    name="password"
                    class="input-blob"
                  />
                  <button type="button" class="toggle-password-blob togglePass">
                    <i class="bi bi-eye"></i>
                  </button>
                </div>
              </div>
              <div class="form-group">
                <label class="form-label">Confirm Password</label>
                <div class="input-blob-group">
                  <span class="input-icon"><i class="bi bi-lock"></i></span>
                  <input
                    type="password"
                    id="companyConfirm"
                    class="input-blob"
                  />
                </div>
              </div>
            </div>
          </div>

          <label class="checkbox-blob">
            <input type="checkbox" name="terms" required />
            <span class="check-custom"></span>
            <span>I agree to Terms & Privacy Policy</span>
          </label>

          <button type="submit" id="submitBtn" class="btn-register student">
            Create Account
          </button>
        </form>

        <div class="register-footer">
          Already have an account? <a href="{{ url_for('login') }}">Sign In</a>
        </div>
      </div>
    </div>

    <script>
      const studentBtn = document.getElementById("studentBtn");
      const companyBtn = document.getElementById("companyBtn");
      const studentForm = document.getElementById("studentForm");
      const companyForm = document.getElementById("companyForm");
      const submitBtn = document.getElementById("submitBtn");
      const userTypeInput = document.getElementById("userTypeInput");
      const registerForm = document.getElementById("registerForm");

      function setUser(type) {
        userTypeInput.value = type;

        // Dynamic Requirement Handling
        const studentInputs = studentForm.querySelectorAll("input");
        const companyInputs = companyForm.querySelectorAll("input, select");

        if (type === "student") {
          studentForm.classList.remove("hidden");
          companyForm.classList.add("hidden");
          studentBtn.classList.add("active");
          companyBtn.classList.remove("active");
          submitBtn.className = "btn-register student";
          submitBtn.textContent = "Create Account";

          studentInputs.forEach((i) => (i.required = true));
          companyInputs.forEach((i) => (i.required = false));
        } else {
          companyForm.classList.remove("hidden");
          studentForm.classList.add("hidden");
          companyBtn.classList.add("active");
          studentBtn.classList.remove("active");
          submitBtn.className = "btn-register company";
          submitBtn.textContent = "Register Company";

          studentInputs.forEach((i) => (i.required = false));
          companyInputs.forEach((i) => {
            if (i.name !== "wilaya") i.required = true;
          });
        }
      }

      studentBtn.onclick = () => setUser("student");
      companyBtn.onclick = () => setUser("company");

      // Password Toggle
      document.querySelectorAll(".togglePass").forEach((btn) => {
        btn.onclick = () => {
          let input = btn.parentElement.querySelector("input");
          input.type = input.type === "password" ? "text" : "password";
          btn.innerHTML =
            input.type === "password"
              ? '<i class="bi bi-eye"></i>'
              : '<i class="bi bi-eye-slash"></i>';
        };
      });

      // Submit Handler
      registerForm.onsubmit = async (e) => {
        e.preventDefault();
        const type = userTypeInput.value;

        // Basic Password Match Validation
        const pass = document.getElementById(type + "Password").value;
        const conf = document.getElementById(type + "Confirm").value;
        if (pass !== conf) return alert("Passwords do not match!");

        let payload = {
          role: type,
          password: pass,
          email: document.querySelector(`input[name="${type}Email"]`).value,
          phoneNumber: document.querySelector(`input[name="${type}Phone"]`)
            .value,
        };

        if (type === "student") {
          payload.student_data = {
            first_name: document.querySelector('input[name="firstName"]').value,
            last_name: document.querySelector('input[name="lastName"]').value,
            university: "L3TI Workshop",
            year: 3,
          };
        } else {
          payload.company_data = {
            company_name: document.querySelector('input[name="companyName"]')
              .value,
            wilaya: document.querySelector('select[name="wilaya"]').value,
          };
        }

        try {
          const res = await fetch("http://127.0.0.1:5000/api/auth/register", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          const result = await res.json();
          if (res.ok) {
            alert("Success!");
            window.location.href = "/login";
          } else {
            alert(result.message || "Error during registration");
          }
        } catch (err) {
          alert("Server unavailable. Is your Flask app running?");
        }
      };

      // Theme Logic
      const toggleBtn = document.getElementById("themeToggle");
      toggleBtn.onclick = () => {
        document.body.classList.toggle("dark");
        const isDark = document.body.classList.contains("dark");
        toggleBtn.querySelector("i").className = isDark
          ? "bi bi-moon-fill"
          : "bi bi-sun-fill";
      };
    </script>
  </body>
</html>
